<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Weekly Schedule</title>
  </head>
  <body>
    <h1>My Weekly Schedule</h1>
    <table>
      <thead>
        <tr>
        <th>Time</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>9:00 AM</td>
          <td>Workout</td>
          <td>Play video games</td>
          <td>Eat breakfast</td>
          <td>Walk</td>
          <td>Work</td>
        </tr>
        <tr>
          <td>11:00 AM</td>
          <td>Eat lunch</td>
          <td>Walk my dog</td>
          <td>Feed my cat</td>
          <td rowspan="2">Nap</td>
          <td>Clean</td>
        </tr>
        <tr>
          <td>12:00 PM</td>
          <td colspan="5">Lunch Break</td>
        </tr>
        <tr>
          <td>2:00 PM</td>
          <td>Nap</td>
          <td>Lunch</td>
          <td>Walk my dog</td>
          <td>Feed my cat</td>
          <td>Workout</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
